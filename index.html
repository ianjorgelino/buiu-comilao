<style>
:root{
  --neon:#39ff14; --pink:#ff2d95; --cyan:#00e5ff; --yellow:#ffe600; --purple:#b400ff;
  --tile-a:#180030; --tile-b:#0f001f;
  --jelly-1:#7a4510; --jelly-2:#2e1200;
  --leaf:#00e844; --leaf-2:#004d14;
  --display:'Lilita One','Comic Sans MS','Chalkboard SE',cursive;
  --body:'Comic Neue','Comic Sans MS','Chalkboard SE',cursive;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
@keyframes rainbowbg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes wobble{0%,100%{transform:rotate(-3deg) scale(1)}50%{transform:rotate(3deg) scale(1.05)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-22px) rotate(8deg)}}
@keyframes huerot{to{filter:hue-rotate(360deg)}}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}75%{transform:translate(3px,-2px)}}

body{
  font-family:var(--body);color:#fff;font-weight:700;
  background:linear-gradient(45deg,#0b0020,#0a0035,#07001f,#130028,#0b0020);
  background-size:600% 600%;animation:rainbowbg 9s ease infinite;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:14px;user-select:none;overflow:hidden;position:relative;
}
/* letreiro rolando */
.marquee{position:fixed;top:0;left:0;right:0;background:#000;color:var(--yellow);
  font-family:var(--display);font-size:16px;letter-spacing:1px;padding:5px 0;white-space:nowrap;
  overflow:hidden;z-index:30;border-bottom:3px solid var(--neon);}
.marquee span{display:inline-block;animation:marquee 12s linear infinite;}
/* emojis flutuando */
.deco{position:fixed;font-size:34px;pointer-events:none;z-index:1;animation:float 4s ease-in-out infinite;filter:drop-shadow(0 3px 4px #0008);}

.hud{width:min(94vw,470px);display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:5;}
.brand{display:flex;align-items:center;gap:8px;}
.brand .blob{width:40px;height:40px;border-radius:46% 54% 50% 50%/55% 50% 50% 45%;flex:0 0 auto;
  background:radial-gradient(circle at 32% 26%,var(--jelly-1),var(--jelly-2));
  box-shadow:0 0 16px var(--neon), inset 0 -5px 9px #0006, inset 0 4px 7px #fff8;position:relative;animation:spin 6s linear infinite;}
.brand .blob::before,.brand .blob::after{content:"";position:absolute;top:13px;width:6px;height:7px;border-radius:50%;background:#06210d;}
.brand .blob::before{left:11px;} .brand .blob::after{right:11px;}
h1.title{font-family:var(--display);font-size:30px;margin:0;line-height:.9;
  background:linear-gradient(90deg,var(--yellow),var(--pink),var(--cyan),var(--neon),var(--yellow));
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  -webkit-text-stroke:2px #000;animation:rainbowbg 3s linear infinite, wobble 1.6s ease-in-out infinite;
  filter:drop-shadow(3px 3px 0 #000);}
.scores{display:flex;gap:8px;}
.pill{background:#000;border:3px solid var(--cyan);border-radius:14px;padding:5px 12px;text-align:center;min-width:72px;
  box-shadow:0 0 12px var(--cyan);}
.pill.best{border-color:var(--pink);box-shadow:0 0 12px var(--pink);}
.pill .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);}
.pill .val{font-family:var(--display);font-size:22px;line-height:1;color:#fff;}
.pill.best .val{color:var(--pink);}

.board-wrap{position:relative;width:min(94vw,470px);aspect-ratio:1;z-index:5;}
canvas{width:100%;height:100%;display:block;border-radius:14px;background:var(--tile-b);touch-action:none;
  border:6px solid transparent;
  background-image:linear-gradient(var(--tile-b),var(--tile-b)),linear-gradient(45deg,var(--pink),var(--yellow),var(--neon),var(--cyan),var(--purple));
  background-origin:border-box;background-clip:padding-box,border-box;
  background-size:auto,300% 300%;animation:rainbowbg 4s linear infinite;
  box-shadow:0 0 26px #000a, 0 0 30px var(--neon);}

.overlay{position:absolute;inset:0;border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;
  background:repeating-linear-gradient(45deg,#000c,#000c 14px,#1a0030cc 14px,#1a0030cc 28px);}
.overlay.hide{display:none;}
.overlay h2{margin:0;font-family:var(--display);font-size:30px;line-height:1;
  color:var(--yellow);-webkit-text-stroke:2px #000;filter:drop-shadow(2px 2px 0 var(--pink));}
.overlay h2.dead{font-size:40px;color:var(--neon);animation:blink .5s steps(1) infinite, shake .4s linear infinite;}
.overlay p{margin:0;font-size:15px;max-width:280px;line-height:1.4;color:#fff;text-shadow:1px 1px 0 #000;}
.overlay .big{font-family:var(--display);font-size:60px;color:var(--cyan);line-height:1;-webkit-text-stroke:2px #000;animation:huerot 2s linear infinite;}
.play{font-family:var(--display);font-size:22px;color:#000;
  background:linear-gradient(180deg,var(--yellow),var(--neon));border:4px solid #000;border-radius:14px;
  padding:12px 28px;cursor:pointer;box-shadow:0 6px 0 #000, 0 0 18px var(--neon);animation:blink 1s steps(1) infinite;}
.play:active{transform:translateY(4px);box-shadow:0 2px 0 #000;}

.dpad{display:grid;grid-template-columns:repeat(3,58px);grid-template-rows:repeat(2,58px);gap:8px;
  width:min(94vw,470px);justify-content:center;z-index:5;}
.dbtn{font-size:24px;color:#000;background:linear-gradient(180deg,var(--cyan),var(--purple));
  border:3px solid #000;border-radius:14px;display:grid;place-items:center;cursor:pointer;box-shadow:0 4px 0 #000;}
.dbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #000;}
.up{grid-column:2;grid-row:1;} .left{grid-column:1;grid-row:2;}
.down{grid-column:2;grid-row:2;} .right{grid-column:3;grid-row:2;}
.hint{color:#000;background:var(--yellow);font-family:var(--display);font-size:12px;padding:4px 12px;border-radius:20px;
  border:2px solid #000;z-index:5;text-align:center;}
@media (hover:hover){ .dpad{display:none;} }
.brand .blob.has-face{background-size:cover !important;background-position:center !important;animation:wobble 1.4s ease-in-out infinite;box-shadow:0 0 16px var(--neon),0 0 0 3px #000;}
.brand .blob.has-face::before,.brand .blob.has-face::after{display:none;}
.ovface{width:120px;height:120px;border-radius:18px;object-fit:cover;border:5px solid #000;box-shadow:0 0 0 5px var(--yellow),0 0 22px var(--neon);animation:wobble 1s ease-in-out infinite;display:none;margin:2px 0;}
@media (prefers-reduced-motion:reduce){ *{animation-duration:0.001s !important;} }
</style>
</head>
<body>

<div class="hud">
  <div class="brand">
    <div class="blob"></div>
    <h1 class="title">BUIU<br>COMILÃO</h1>
  </div>
  <div class="scores">
    <div class="pill"><div class="lbl">Folhas</div><div class="val" id="score">0</div></div>
    <div class="pill best"><div class="lbl">Recorde</div><div class="val" id="best">0</div></div>
  </div>
</div>

<div class="board-wrap">
  <canvas id="board"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="ovTitle">🌿 BUIU COMILÃO 🌿</h2>
    <img id="ovFace" class="ovface" alt="Buiu">
    <div class="big" id="ovScore" style="display:none">0</div>
    <p id="ovText">A geleia cresce a cada folha 🌿 não bate na parede nem em ti mesmo!</p>
    <button class="play" id="playBtn">JOGAR 🤤</button>
  </div>
</div>

<div class="dpad" id="dpad">
  <button class="dbtn up"    data-dir="up">▲</button>
  <button class="dbtn left"  data-dir="left">◀</button>
  <button class="dbtn down"  data-dir="down">▼</button>
  <button class="dbtn right" data-dir="right">▶</button>
</div>

const faceImg=new Image(); let faceReady=false;
faceImg.onload=()=>{ faceReady=true; };
faceImg.src=FACE;

const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');
const ovText  = document.getElementById('ovText');
const ovScore = document.getElementById('ovScore');
const ovFace  = document.getElementById('ovFace');
const playBtn = document.getElementById('playBtn');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');

const BEST_KEY = 'buiu-comilao-recorde';
let best = carregarRecorde();
bestEl.textContent = best;

let buiu, dir, nextDir, folha, score, estado, passo, acumulado, ultimo, comeuPop;

function reset(){
  const meio = Math.floor(N/2);
  buiu = [{x:meio-1,y:meio},{x:meio-2,y:meio},{x:meio-3,y:meio}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; passo = 145; acumulado = 0; comeuPop = 0;
  scoreEl.textContent = '0';
  porFolha();
}
function porFolha(){
  let livre;
  do { livre = {x:rnd(N), y:rnd(N)}; }
  while (buiu.some(s=>s.x===livre.x && s.y===livre.y));
  folha = livre;
}
const rnd = n => Math.floor(Math.random()*n);

function loop(t){
  if(estado!=='playing') return;
  if(!ultimo) ultimo = t;
  acumulado += t - ultimo; ultimo = t;
  while(acumulado >= passo){ avancar(); acumulado -= passo; }
  if(comeuPop>0) comeuPop -= 0.08;
  desenhar();
  requestAnimationFrame(loop);
}
function avancar(){
  dir = nextDir;
  const cabeca = {x:buiu[0].x+dir.x, y:buiu[0].y+dir.y};
  if(cabeca.x<0||cabeca.y<0||cabeca.x>=N||cabeca.y>=N) return fim();
  const vaiComer = (cabeca.x===folha.x && cabeca.y===folha.y);
  const corpo = vaiComer ? buiu : buiu.slice(0,-1);
  if(corpo.some(s=>s.x===cabeca.x && s.y===cabeca.y)) return fim();
  buiu.unshift(cabeca);
  if(vaiComer){
    score++; scoreEl.textContent = score; comeuPop = 1;
    passo = Math.max(70, 145 - score*3);
    porFolha();
  } else { buiu.pop(); }
}
function fim(){
  estado = 'over';
  if(score>best){ best=score; bestEl.textContent=best; salvarRecorde(best); }
  ovTitle.textContent = 'CHARROU BUIU 💨';
  ovTitle.classList.add('dead');
  ovScore.style.display='block';
  ovScore.textContent = score;
  ovText.textContent = (score===1?'1 folha 🌿':score+' folhas 🌿') + ' — bora de novo!';
  playBtn.textContent = 'DE NOVO 🔥';
  ovFace.style.display='block';
  overlay.classList.remove('hide');
}

/* ---------- Desenho ---------- */
function desenhar(){
  const agora = performance.now();
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){
    ctx.fillStyle = (x+y)%2 ? getCss('--tile-a') : getCss('--tile-b');
    ctx.fillRect(x*cell, y*cell, cell, cell);
  }
  // folha com glow neon
  ctx.save();
  ctx.shadowColor = getCss('--neon'); ctx.shadowBlur = cell*0.7;
  desenhaFolha(folha.x*cell+cell/2, folha.y*cell+cell/2, cell*0.52, agora);
  ctx.restore();

  // geleia neon (glow + tremor)
  ctx.save();
  ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = cell*0.55;
  for(let i=buiu.length-1;i>=0;i--){
    const s = buiu[i];
    const t = 1 - i/Math.max(1,buiu.length);
    const cor = mix(getCss('--jelly-2'), getCss('--jelly-1'), t);
    const tremor = Math.sin(agora/160 + i*0.6)*cell*0.035;
    let m = cell*0.10 + tremor;
    if(i===0 && comeuPop>0) m -= cell*0.06*comeuPop;
    const x=s.x*cell+m, y=s.y*cell+m, w=cell-2*m, h=cell-2*m, r=cell*0.36;
    roundRect(x,y,w,h,r,cor);
    if(i===0 && faceReady){
      ctx.save(); ctx.shadowBlur=0;
      const fx=x+w*0.09, fy=y+h*0.09, fw=w*0.82, fh=h*0.82;
      roundRectPath(fx,fy,fw,fh,r*0.7); ctx.clip();
      ctx.drawImage(faceImg, fx, fy, fw, fh);
      ctx.restore();
    } else {
      ctx.shadowBlur=0;
      ctx.globalAlpha=0.55; ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.ellipse(x+w*0.32,y+h*0.28,w*0.22,h*0.14,-0.5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
    ctx.shadowBlur=cell*0.5;
  }
  ctx.restore();

  // olhos do Buiu
  const head = buiu[0];
  const cx = head.x*cell + cell/2, cy = head.y*cell + cell/2;
  const off = cell*0.16, eye = cell*0.1, fwd = cell*0.12;
  const ox = dir.x*fwd, oy = dir.y*fwd;
  if(!faceReady){
    ctx.fillStyle = '#06210d';
    const e1 = perp(off), e2 = perp(-off);
    ctx.beginPath(); ctx.arc(cx+ox+e1.x, cy+oy+e1.y, eye, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ox+e2.x, cy+oy+e2.y, eye, 0, Math.PI*2); ctx.fill();
  }
}
function perp(d){ return dir.x!==0 ? {x:0,y:d} : {x:d,y:0}; }

function desenhaFolha(cx, cy, size, agora){
  const balanco = Math.sin(agora/300)*0.18;
  const base = -Math.PI/2 + balanco;
  const angs = [0, 0.55,-0.55, 1.1,-1.1, 1.65,-1.65, 2.1,-2.1];
  const lens = [1, 0.84, 0.84, 0.68, 0.68, 0.50, 0.50, 0.35, 0.35];
  ctx.strokeStyle = getCss('--leaf-2'); ctx.lineWidth = size*0.08; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy+size*0.1); ctx.lineTo(cx,cy+size*0.55); ctx.stroke();
  for(let i=0;i<angs.length;i++){ foliolo(cx, cy, base+angs[i], size*lens[i], size*lens[i]*0.18); }
  ctx.fillStyle = getCss('--leaf-2');
  ctx.beginPath(); ctx.arc(cx,cy,size*0.07,0,Math.PI*2); ctx.fill();
}
function foliolo(cx,cy,ang,L,W){
  const ux=Math.cos(ang), uy=Math.sin(ang);
  const px=-uy, py=ux;
  const n=5; // dentes de serrilhado por lado
  ctx.fillStyle=getCss('--leaf');
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  // lado direito: base → ponta
  for(let i=1;i<=n;i++){
    const t=i/n, taper=Math.pow(1-t,0.45);
    const tp=(i-0.5)/n, taperP=Math.pow(1-tp,0.45);
    ctx.lineTo(cx+ux*L*tp + px*W*taperP, cy+uy*L*tp + py*W*taperP); // pico
    if(i===n) ctx.lineTo(cx+ux*L, cy+uy*L);                           // ponta
    else ctx.lineTo(cx+ux*L*t + px*W*taper*0.58, cy+uy*L*t + py*W*taper*0.58); // vale
  }
  // lado esquerdo: ponta → base
  for(let i=n-1;i>=0;i--){
    const t=i/n, taper=Math.pow(1-t,0.45);
    const tp=(i+0.5)/n, taperP=Math.pow(1-tp,0.45);
    ctx.lineTo(cx+ux*L*tp - px*W*taperP, cy+uy*L*tp - py*W*taperP); // pico
    if(i>0) ctx.lineTo(cx+ux*L*t - px*W*taper*0.58, cy+uy*L*t - py*W*taper*0.58); // vale
  }
  ctx.closePath(); ctx.fill();
  // nervura central
  ctx.strokeStyle=getCss('--leaf-2'); ctx.lineWidth=L*0.07; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+ux*L*0.9,cy+uy*L*0.9); ctx.stroke();
}
function roundRectPath(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function roundRect(x,y,w,h,r,fill){ ctx.fillStyle=fill; roundRectPath(x,y,w,h,r); ctx.fill(); }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function mix(a,b,t){
  const ca=hex(a), cb=hex(b);
  const r=Math.round(ca[0]+(cb[0]-ca[0])*t), g=Math.round(ca[1]+(cb[1]-ca[1])*t), bl=Math.round(ca[2]+(cb[2]-ca[2])*t);
  return 'rgb('+r+','+g+','+bl+')';
}
function hex(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }

/* ---------- Controles ---------- */
function setDir(nx,ny){
  if(estado!=='playing') return;
  if(nx===-dir.x && ny===-dir.y) return;
  nextDir = {x:nx,y:ny};
}
const teclas = {
  ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
  w:[0,-1],s:[0,1],a:[-1,0],d:[1,0], W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]
};
document.addEventListener('keydown', e=>{
  if((e.key===' '||e.key==='Enter') && estado!=='playing'){ iniciar(); return; }
  const t = teclas[e.key];
  if(t){ e.preventDefault(); setDir(t[0],t[1]); }
});
document.getElementById('dpad').addEventListener('click', e=>{
  const b=e.target.closest('.dbtn'); if(!b) return;
  const map={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const d=map[b.dataset.dir]; setDir(d[0],d[1]);
});
let tx=0,ty=0;
cv.addEventListener('pointerdown', e=>{ tx=e.clientX; ty=e.clientY; });
cv.addEventListener('pointerup', e=>{
  const dx=e.clientX-tx, dy=e.clientY-ty;
  if(Math.abs(dx)<14 && Math.abs(dy)<14) return;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
});
playBtn.addEventListener('click', iniciar);

function iniciar(){
  reset(); estado='playing';
  ovScore.style.display='none'; ovFace.style.display='none'; overlay.classList.add('hide');
  ovTitle.classList.remove('dead');
  ultimo=0; acumulado=0; requestAnimationFrame(loop);
}
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden && estado==='playing'){ estado='pausado'; }
  else if(!document.hidden && estado==='pausado'){ estado='playing'; ultimo=0; requestAnimationFrame(loop); }
});
function carregarRecorde(){ try{ return parseInt(localStorage.getItem(BEST_KEY))||0; }catch(e){ return 0; } }
function salvarRecorde(v){ try{ localStorage.setItem(BEST_KEY, v); }catch(e){} }
function ajustar(){
  const css = cv.getBoundingClientRect().width;
  const dpr = window.devicePixelRatio||1;
  cv.width = Math.round(css*dpr); cv.height = Math.round(css*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cell = css / N;
  desenhar();
}
window.addEventListener('resize', ajustar);
ovFace.src=FACE;
const blobEl=document.querySelector('.brand .blob');
if(blobEl){ blobEl.classList.add('has-face'); blobEl.style.backgroundImage='url('+FACE+')'; }
reset(); estado='start'; ajustar(); desenhar();
</script>
